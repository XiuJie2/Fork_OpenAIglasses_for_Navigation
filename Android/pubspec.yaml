name: android_ai_glasses
description: "AI 智慧眼鏡 Android App：取代 ESP32 硬體，提供視障友善導航介面"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # ── 網路 ──────────────────────────────────────────────
  web_socket_channel: ^2.4.0
  dio: ^5.7.0

  # ── 攝影機 ────────────────────────────────────────────
  camera: ^0.10.5+9

  # ── 音訊（麥克風錄音 + 播放）─────────────────────────
  # 5.1.x 的 record_web 與 record_platform_interface 存在介面不相容問題
  # 鎖定 5.0.5 確保版本一致性
  record: 5.0.5
  audioplayers: ^6.1.0
  flutter_tts: ^4.2.1

  # ── IMU 感測器 ────────────────────────────────────────
  sensors_plus: ^5.0.1

  # ── 儲存 ──────────────────────────────────────────────
  shared_preferences: ^2.3.2

  # ── 狀態管理 ──────────────────────────────────────────
  provider: ^6.1.2

  # ── 前台服務（背景喚醒詞監聽）────────────────────────
  flutter_foreground_task: ^8.1.0

  # ── 權限 ──────────────────────────────────────────────
  permission_handler: ^11.3.1

  # ── 撥打電話 ──────────────────────────────────────────
  url_launcher: ^6.3.1

  # ── GPS 定位 ────────────────────────────────────────
  geolocator: ^13.0.2
  geocoding: ^3.0.0

  # ── 本地資料庫（連絡人快取、儲存地點）──────────────────
  sqflite: ^2.4.2
  path: ^1.9.0
  android_intent_plus: ^6.0.0

  # ── 本地通知（背景撞擊全螢幕警示）────────────────────
  flutter_local_notifications: ^17.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.3

# ── 版本衝突修正 ──────────────────────────────────────────────────────────────
# record_web 1.1.9 實作的 hasPermission 少了 {bool request} 具名參數，
# 與 record_platform_interface 1.5.0 介面不相符（只影響 Chrome/Web 建置）。
# 強制升級 record_web 到實作新介面的版本。
# 注意：此 App 主要目標為 Android，建議用 flutter run -d <裝置> 而非 -d chrome
dependency_overrides:
  # record_platform_interface 1.5.0 加了新介面，但 record_web/record_linux 0.7.x 未實作
  # 強制升級到已實作新介面的版本
  record_web:   ^1.3.0
  record_linux: ^1.3.0

flutter:
  uses-material-design: true
  assets:
    - assets/icon/

flutter_launcher_icons:
  android: true
  ios:     false
  image_path: "assets/icon/app_icon.png"
  min_sdk_android: 21
  adaptive_icon_background: "#121212"
  adaptive_icon_foreground: "assets/icon/app_icon.png"
