upstream backend {
    server backend:8000;
}

upstream frontend {
    server frontend:3000;
}

server {
    listen 80;
    server_name localhost;
    client_max_body_size 100M;

    # 強制 Docker 內部 DNS 使用 IPv4，避免 host.docker.internal 解析為 IPv6 導致連線失敗
    resolver 127.0.0.11 ipv6=off valid=30s;

    # Django 靜態檔案（collectstatic 輸出）
    location /static/ {
        alias /static/;
    }

    # APK 下載（強制觸發瀏覽器下載）
    location /media/downloads/ {
        alias /media/downloads/;
        add_header Content-Disposition 'attachment';
    }

    # 媒體檔案（上傳圖片、3D 模型）
    location /media/ {
        alias /media/;
    }

    # ── APP WebSocket → FastAPI（/ws、/ws_ui、/ws_audio、/ws/camera、/ws/viewer）
    location /ws {
        proxy_pass http://host.docker.internal:8081;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        proxy_connect_timeout 10s;
    }

    # ── TTS 音訊串流 → FastAPI
    location = /stream.wav {
        proxy_pass http://host.docker.internal:8081/stream.wav;
        proxy_set_header Host $host;
        proxy_read_timeout 3600s;
    }

    # ── APP 導航 API → FastAPI（比 /api/ Django 規則更具體，優先匹配）
    location /api/nav/ {
        proxy_pass http://host.docker.internal:8081/api/nav/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
    location = /api/health {
        proxy_pass http://host.docker.internal:8081/api/health;
        proxy_set_header Host $host;
    }
    location = /api/debug_status {
        proxy_pass http://host.docker.internal:8081/api/debug_status;
        proxy_set_header Host $host;
    }
    location /api/settings/ {
        proxy_pass http://host.docker.internal:8081/api/settings/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
    location = /api/read_document {
        proxy_pass http://host.docker.internal:8081/api/read_document;
        proxy_set_header Host $host;
        proxy_read_timeout 90s;
    }
    location = /api/explain_document {
        proxy_pass http://host.docker.internal:8081/api/explain_document;
        proxy_set_header Host $host;
        proxy_read_timeout 60s;
    }

    # ── 網站 API → Django（其餘所有 /api/ 路由）
    location /api/ {
        proxy_pass http://backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Django 原始後台（路徑 /django-admin/ → Django /admin/）
    location /django-admin/ {
        proxy_pass http://backend/admin/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ══════════════════════════════════════════════════════════════════════
    # 多裝置路由（/device/1/ ~ /device/4/）
    # 每台裝置各自獨立的 FastAPI instance，port 8081 ~ 8084
    # nginx 自動剝除 /device/N/ 前綴後轉發，包含完整 WebSocket 支援
    # ══════════════════════════════════════════════════════════════════════

    # ── 裝置 1（port 8081）──
    location /device/1/ {
        proxy_pass http://host.docker.internal:8081/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        proxy_connect_timeout 10s;
    }

    # ── 裝置 2（port 8082）──
    location /device/2/ {
        proxy_pass http://host.docker.internal:8082/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        proxy_connect_timeout 10s;
    }

    # ── 裝置 3（port 8083）──
    location /device/3/ {
        proxy_pass http://host.docker.internal:8083/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        proxy_connect_timeout 10s;
    }

    # ── 裝置 4（port 8084）──
    location /device/4/ {
        proxy_pass http://host.docker.internal:8084/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        proxy_connect_timeout 10s;
    }

    # ── 裝置狀態聚合 API（供 Website Admin 監控面板查詢）──
    # /api/devices/1/status → 裝置1 的 debug_status
    location = /api/devices/1/status {
        proxy_pass http://host.docker.internal:8081/api/debug_status;
        proxy_set_header Host $host;
        proxy_connect_timeout 3s;
        proxy_read_timeout 5s;
    }
    location = /api/devices/2/status {
        proxy_pass http://host.docker.internal:8082/api/debug_status;
        proxy_set_header Host $host;
        proxy_connect_timeout 3s;
        proxy_read_timeout 5s;
    }
    location = /api/devices/3/status {
        proxy_pass http://host.docker.internal:8083/api/debug_status;
        proxy_set_header Host $host;
        proxy_connect_timeout 3s;
        proxy_read_timeout 5s;
    }
    location = /api/devices/4/status {
        proxy_pass http://host.docker.internal:8084/api/debug_status;
        proxy_set_header Host $host;
        proxy_connect_timeout 3s;
        proxy_read_timeout 5s;
    }

    # ══════════════════════════════════════════════════════════════════════

    # /speaker 舊路徑 → 301 轉址至正確位置
    location = /speaker {
        return 301 /device/1/speaker;
    }

    # GlassesBackstage 向後相容（直接代理至裝置 1，不可用 redirect，否則 WebSocket 會斷線）
    location /GlassesBackstage/ {
        set $fastapi_host "host.docker.internal:8081";
        proxy_pass http://$fastapi_host/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        proxy_connect_timeout 10s;
    }

    # React 前端（其餘所有路由，含 /admin/）
    location / {
        proxy_pass http://frontend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
