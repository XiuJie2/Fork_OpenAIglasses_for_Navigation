upstream backend {
    server backend:8000;
}

upstream frontend {
    server frontend:3000;
}

server {
    listen 80;
    server_name localhost;
    client_max_body_size 100M;

    # 強制 Docker 內部 DNS 使用 IPv4，避免 host.docker.internal 解析為 IPv6 導致連線失敗
    resolver 127.0.0.11 ipv6=off valid=30s;

    # Django 靜態檔案（collectstatic 輸出）
    location /static/ {
        alias /static/;
    }

    # APK 下載（強制觸發瀏覽器下載）
    location /media/downloads/ {
        alias /media/downloads/;
        add_header Content-Disposition 'attachment';
    }

    # 媒體檔案（上傳圖片、3D 模型）
    location /media/ {
        alias /media/;
    }

    # ── APP WebSocket → FastAPI（/ws、/ws_ui、/ws_audio、/ws/camera、/ws/viewer）
    location /ws {
        proxy_pass http://host.docker.internal:8081;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        proxy_connect_timeout 10s;
    }

    # ── TTS 音訊串流 → FastAPI
    location = /stream.wav {
        proxy_pass http://host.docker.internal:8081/stream.wav;
        proxy_set_header Host $host;
        proxy_read_timeout 3600s;
    }

    # ── APP 導航 API → FastAPI（比 /api/ Django 規則更具體，優先匹配）
    location /api/nav/ {
        proxy_pass http://host.docker.internal:8081/api/nav/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
    location = /api/health {
        proxy_pass http://host.docker.internal:8081/api/health;
        proxy_set_header Host $host;
    }
    location = /api/debug_status {
        proxy_pass http://host.docker.internal:8081/api/debug_status;
        proxy_set_header Host $host;
    }
    location /api/settings/ {
        proxy_pass http://host.docker.internal:8081/api/settings/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
    location = /api/read_document {
        proxy_pass http://host.docker.internal:8081/api/read_document;
        proxy_set_header Host $host;
        proxy_read_timeout 90s;
    }
    location = /api/explain_document {
        proxy_pass http://host.docker.internal:8081/api/explain_document;
        proxy_set_header Host $host;
        proxy_read_timeout 60s;
    }

    # ── 網站 API → Django（其餘所有 /api/ 路由）
    location /api/ {
        proxy_pass http://backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Django 原始後台（路徑 /django-admin/ → Django /admin/）
    location /django-admin/ {
        proxy_pass http://backend/admin/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # FastAPI 裝置後台（代理至宿主機 port 8081，自動移除 /device-api 前綴）
    # 必須加入 WebSocket 支援，否則 ws/camera、ws_audio、ws_ui、ws 等連線會失敗
    location /device-api/ {
        set $fastapi_host "host.docker.internal:8081";
        proxy_pass http://$fastapi_host/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 3600s;
        proxy_connect_timeout 10s;
        proxy_send_timeout 3600s;
        # WebSocket 支援（相機/音訊/IMU/UI 串流必須）
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # /speaker 舊路徑 → 301 轉址至正確位置
    location = /speaker {
        return 301 /GlassesBackstage/speaker;
    }

    # FastAPI 眼鏡後台公開路徑（/GlassesBackstage/ → FastAPI port 8081/）
    location /GlassesBackstage/ {
        set $fastapi_host "host.docker.internal:8081";
        proxy_pass http://$fastapi_host/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 3600s;
        proxy_connect_timeout 10s;
        proxy_send_timeout 3600s;
    }

    # React 前端（其餘所有路由，含 /admin/）
    location / {
        proxy_pass http://frontend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
