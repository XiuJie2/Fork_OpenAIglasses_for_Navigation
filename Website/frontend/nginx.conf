server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # React SPA：所有路由都回傳 index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # 靜態資源快取
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|glb)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
