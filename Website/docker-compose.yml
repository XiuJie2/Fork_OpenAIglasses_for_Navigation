services:
  db:
    image: postgres:15-alpine
    container_name: glasses_db
    restart: unless-stopped
    volumes:
      - postgres_data:/var/lib/postgresql/data
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: glasses_backend
    restart: unless-stopped
    volumes:
      - ./backend:/app
      - media_files:/app/media
      - static_files:/app/staticfiles
      - ./aiglass.glb:/app/media/models/aiglass.glb:ro
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env
    expose:
      - "8000"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: glasses_frontend
    restart: unless-stopped
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend
    expose:
      - "3000"
    environment:
      - CHOKIDAR_USEPOLLING=true

  nginx:
    image: nginx:1.25-alpine
    container_name: glasses_nginx
    restart: unless-stopped
    ports:
      - "8888:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - media_files:/media:ro
      - static_files:/static:ro
      - ./aiglass.glb:/media/models/aiglass.glb:ro
    # 讓容器能透過 host.docker.internal 存取宿主機（FastAPI port 8081）
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - backend
      - frontend

volumes:
  postgres_data:
  media_files:
  static_files:
